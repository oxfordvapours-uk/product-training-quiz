<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Add Quiz Question</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f3f6f3;
        margin: 0;
        color: #17211a;
      }
      .wrap {
        max-width: 850px;
        margin: auto;
        padding: 24px;
      }
      .card {
        background: white;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 8px 25px #0002;
        margin: 18px 0;
      }
      h1 {
        color: #35ad2f;
      }
      label {
        display: block;
        font-weight: 700;
        margin: 14px 0 6px;
      }
      input,
      select,
      textarea,
      button {
        width: 100%;
        padding: 12px;
        border: 1px solid #cbd5cb;
        border-radius: 9px;
        font-size: 1rem;
        box-sizing: border-box;
      }
      textarea {
        min-height: 90px;
      }
      button {
        background: #35ad2f;
        color: white;
        border: 0;
        font-weight: 700;
        cursor: pointer;
      }
      .secondary {
        background: #e9efe9;
        color: #17211a;
      }
      .danger {
        background: #b42318;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin: 8px 0;
      }
      .row input[type="radio"] {
        width: auto;
      }
      .row input[type="text"] {
        flex: 1;
      }
      .row button {
        width: auto;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 18px;
      }
      .hidden {
        display: none;
      }
      .status {
        background: #f4f7f4;
        padding: 12px;
        border-radius: 9px;
        margin-top: 12px;
      }
    </style>
  </head>
  <body data-page="add">
    <div class="wrap">
      <a href="index.html" class="back-btn">← Back to Quiz</a>
      <!-- 
      <div class="card">
        <p>
          Open the question-bank JSON file, complete the form, then save
          directly back to the same file.
        </p>
        <button id="openBtn">Open question-bank JSON</button>
        <div id="fileInfo" class="status hidden"></div>
      </div> -->

      <div id="formCard" class="card">
        <h1>Add a new question</h1>

        <label>Category</label
        ><select id="category"></select>
        <label>Question</label><textarea id="question"></textarea>
        <label>Possible answers</label>
        <p>Select the radio button beside the correct answer.</p>
        <div id="answers"></div>
        <button type="button" id="addAnswerBtn" class="secondary">
          Add another possible answer
        </button>
        <label>Explanation (optional)</label
        ><textarea id="explanation"></textarea>
        <div class="actions">
          <button id="saveBtn">Add question and save JSON</button
          ><button id="clearBtn" class="secondary">Clear form</button>
        </div>
        <div id="status" class="status hidden"></div>
      </div>
    </div>
    
      <script src="script.js" defer></script>
  </body>
</html>
