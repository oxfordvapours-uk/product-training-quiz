<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Edit Quiz Questions</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f3f6f3;
        margin: 0;
        color: #17211a;
      }
      .wrap {
        max-width: 1000px;
        margin: auto;
        padding: 24px;
      }
      .card {
        background: white;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 8px 25px #0002;
        margin: 18px 0;
      }
      h1 {
        color: #35ad2f;
      }
      label {
        display: block;
        font-weight: 700;
        margin: 14px 0 6px;
      }
      input,
      select,
      textarea,
      button {
        width: 100%;
        padding: 11px;
        border: 1px solid #cbd5cb;
        border-radius: 9px;
        font-size: 1rem;
        box-sizing: border-box;
      }
      textarea {
        min-height: 85px;
      }
      button {
        background: #35ad2f;
        color: white;
        border: 0;
        font-weight: 700;
        cursor: pointer;
      }
      .secondary {
        background: #e9efe9;
        color: #17211a;
      }
      .danger {
        background: #b42318;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin: 8px 0;
      }
      .row input[type="radio"] {
        width: auto;
      }
      .row input[type="text"] {
        flex: 1;
      }
      .row button {
        width: auto;
      }
      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: end;
        position: sticky;
        top: 0;
        background: #f3f6f3;
        padding: 10px 0;
        z-index: 3;
      }
      .toolbar button {
        width: auto;
      }
      .question-card {
        border-left: 6px solid #35ad2f;
      }
      .header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
      }
      .header button {
        width: auto;
      }
      .hidden {
        display: none;
      }
      .status {
        background: #f4f7f4;
        padding: 12px;
        border-radius: 9px;
        margin-top: 12px;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }
      .actions button {
        width: auto;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <a href="index.html" class="back-btn">← Back to Quiz</a>
      <div class="card">
        <h1>Edit existing questions</h1>
        <p>
          Open the JSON bank, search the questions, edit the prefilled fields,
          and save back to the same file.
        </p>
        <button id="openBtn">Open question-bank JSON</button>
        <div id="fileInfo" class="status hidden"></div>
      </div>
      <div id="editor" class="hidden">
        <div class="toolbar">
          <div>
            <label>Search</label
            ><input
              id="search"
              type="search"
              placeholder="Search question, answer, category or ID"
            />
          </div>
          <button id="saveAllBtn">Save all changes</button>
        </div>
        <p id="count"></p>
        <div id="questions"></div>
      </div>
    </div>
    <script>
      let bank = null;
      const $ = (id) => document.getElementById(id);
      function esc(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      function categoryOptions(selected) {
        return [
          ...new Set(bank.questions.map((q) => q.category).filter(Boolean)),
        ]
          .sort()
          .map(
            (c) =>
              `<option ${c === selected ? "selected" : ""}>${esc(c)}</option>`,
          )
          .join("");
      }
      function render() {
        const term = $("search").value.trim().toLowerCase();
        $("questions").innerHTML = "";
        let shown = 0;
        bank.questions.forEach((q, index) => {
          const hay = [q.id, q.question, q.category, ...(q.choices || [])]
            .join(" ")
            .toLowerCase();
          if (term && !hay.includes(term)) return;
          shown++;
          const card = document.createElement("div");
          card.className = "card question-card";
          card.dataset.index = index;
          card.innerHTML = `<div class="header"><strong>${esc(q.id)}</strong><button class="danger delete">Delete question</button></div><label>Category</label><select class="category">${categoryOptions(q.category)}</select><label>Question</label><textarea class="question">${esc(q.question)}</textarea><label>Possible answers</label><div class="answers">${(q.choices || []).map((a, i) => `<div class="row answer-row"><input type="radio" name="correct-${index}" ${i === q.answer ? "checked" : ""}><input type="text" class="answerText" value="${esc(a)}"><button type="button" class="danger remove">Remove</button></div>`).join("")}</div><button type="button" class="secondary add">Add another possible answer</button><label>Explanation</label><textarea class="explanation">${esc(q.explanation || "")}</textarea><div class="actions"><button type="button" class="saveOne">Keep this edit</button></div>`;
          card
            .querySelectorAll(".remove")
            .forEach((b) => (b.onclick = () => removeAnswer(b)));
          card.querySelector(".add").onclick = () => addAnswer(card);
          card.querySelector(".saveOne").onclick = () => {
            try {
              saveCard(card);
              alert(
                `${q.id} updated in memory. Click Save all changes to write the file.`,
              );
            } catch (e) {
              alert(e.message);
            }
          };
          card.querySelector(".delete").onclick = () => {
            if (confirm(`Delete ${q.id}?`)) {
              bank.questions.splice(index, 1);
              render();
            }
          };
          $("questions").appendChild(card);
        });
        $("count").textContent =
          `Showing ${shown} of ${bank.questions.length} questions`;
      }
      function addAnswer(card) {
        const row = document.createElement("div");
        row.className = "row answer-row";
        row.innerHTML = `<input type="radio" name="correct-${card.dataset.index}"><input type="text" class="answerText" placeholder="Possible answer"><button type="button" class="danger remove">Remove</button>`;
        row.querySelector(".remove").onclick = () =>
          removeAnswer(row.querySelector(".remove"));
        card.querySelector(".answers").appendChild(row);
      }
      function removeAnswer(btn) {
        const card = btn.closest(".question-card");
        if (card.querySelectorAll(".answer-row").length <= 2)
          return alert("At least two answers are required.");
        btn.closest(".answer-row").remove();
      }
      function saveCard(card) {
        const i = Number(card.dataset.index),
          q = bank.questions[i],
          rows = [...card.querySelectorAll(".answer-row")],
          choices = rows
            .map((r) => r.querySelector(".answerText").value.trim())
            .filter(Boolean),
          selected = rows.find(
            (r) => r.querySelector("input[type=radio]").checked,
          );
        if (!card.querySelector(".question").value.trim())
          throw new Error(`${q.id}: question is blank.`);
        if (choices.length < 2)
          throw new Error(`${q.id}: at least two answers are required.`);
        if (!selected || !selected.querySelector(".answerText").value.trim())
          throw new Error(`${q.id}: select a non-blank correct answer.`);
        const correct = selected.querySelector(".answerText").value.trim();
        q.category = card.querySelector(".category").value;
        q.question = card.querySelector(".question").value.trim();
        q.choices = choices;
        q.answer = choices.indexOf(correct);
        q.explanation =
          card.querySelector(".explanation").value.trim() || correct;
      }
      async function writeBank() {
        document.querySelectorAll(".question-card").forEach(saveCard);
        bank.question_count = bank.questions.length;
        alert(
          "Browser JavaScript cannot overwrite files loaded with fetch(). Send the JSON to a server endpoint or download it instead.",
        );
        $("fileInfo").textContent =
          `Saved ${bank.questions.length} questions to ${fileHandle.name}`;
        $("fileInfo").classList.remove("hidden");
      }
      async function openBank() {
        const r = await fetch("question-bank.json");
        bank = await r.json();
        if (!Array.isArray(bank.questions))
          throw new Error("No questions array found.");
        $("fileInfo").textContent =
          `question-bank.json loaded — ${bank.questions.length} questions`;
        $("fileInfo").classList.remove("hidden");
        $("editor").classList.remove("hidden");
        render();
      }
      $("openBtn").onclick = openBank;
      $("search").oninput = render;
      $("saveAllBtn").onclick = () =>
        writeBank().catch((e) => alert(e.message));
    </script>
  </body>
</html>
